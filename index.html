// -------- RENDER BARRA DE GRUPOS --------
function renderBarraGrupos(){
    const cont = document.getElementById("barraGrupos");
    cont.innerHTML = "";

    for(const nombreGrupo in grupos){
        const grupo = grupos[nombreGrupo];
        // Solo mostrar si tiene al menos un alumno
        if(!grupo.alumnos || grupo.alumnos.length === 0) continue;

        let abrev = nombreGrupo
            .replace("PRIMERO DE SECUNDARIA GRUPO A","1° sec")
            .replace("SEGUNDO DE SECUNDARIA GRUPO A","2° sec")
            .replace("TERCERO DE SECUNDARIA GRUPO A","3° sec")
            .replace("PRIMER SEMESTRE DE PREPARATORIA GRUPO A","1° prepa")
            .replace("SEGUNDO SEMESTRE DE PREPARATORIA GRUPO A","2° prepa")
            .replace("TERCER SEMESTRE DE PREPARATORIA GRUPO A","3° prepa")
            .replace("CUARTO SEMESTRE DE PREPARATORIA GRUPO A","4° prepa")
            .replace("QUINTO SEMESTRE DE PREPARATORIA GRUPO A","5° prepa")
            .replace("SEXTO SEMESTRE DE PREPARATORIA GRUPO A","6° prepa");

        const btn = document.createElement("button");
        btn.className = "btn btn-sm me-1 mb-1";
        btn.innerText = abrev;
        if(grupoActivo === nombreGrupo) btn.classList.add("btn-primary");
        else btn.classList.add("btn-outline-secondary");
        btn.onclick = ()=>{
            grupoActivo = grupoActivo === nombreGrupo ? null : nombreGrupo;
            renderGrupos();
            renderBarraGrupos();
        };
        cont.appendChild(btn);
    }

}

            if(!puedeVerAlumno(alumno)) return
            
            
            
            
            
            
            
            
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td contenteditable>${alumno.numerolista||""}</td>

                <td contenteditable>${alumno.fecha||""}</td>

                <td class="btn-delete"><button class="btn btn-danger btn-sm">X</button></td>

            // Actualizar datos al editar
            ["numerolista","nombre","actividades","fecha"].forEach((campo,idx)=>{
                tr.children[idx].addEventListener("input",()=>{
                    alumno[campo]=tr.children[idx].innerText;

                });
            });

            // Detalle de columnas extra
            const detalle = document.createElement("tr");
            detalle.style.display="none";
            detalle.className="detalle";
            let campos = "";
            grupo.columnasExtra.forEach(col=>{

    if(!puedeVerColumna(col)) return

    const readonly = puedeEditarColumna(col) ? "" : "readonly"

    campos+=`<div class="col-md-6 mb-2">

            // Mostrar/ocultar detalle

                    renderGrupos(); renderFiltros(); renderTablaFiltros(); guardarSupabase();

if(valorAnterior===valorNuevo) return

        box.querySelector(".delCol").onclick = ()=>{

            let sel = prompt("Columnas:\n"+menu+"\n\nNúmero a eliminar:");

const modal = document.getElementById("modalActualizar");
const modalInputs = document.getElementById("modalInputs");

document.getElementById("actualizarGruposBtn").onclick = () => {
    modalInputs.innerHTML = "";

    // Botón para crear nuevo grupo
    const crearBtn = document.createElement("button");
    crearBtn.className = "btn btn-success mb-3";
    crearBtn.innerText = "Crear nuevo grupo";
    crearBtn.onclick = () => {
        const nombreNuevo = prompt("Nombre del nuevo grupo:");
        if(!nombreNuevo) return;
        if(grupos[nombreNuevo]) return alert("El grupo ya existe");
        grupos[nombreNuevo] = { columnasExtra: [...columnasBase], alumnos: [] };
        renderBarraGrupos();
        renderGrupos();
        renderFiltros();
        renderTablaFiltros();
        renderModalGrupos(); // actualizar modal
    };
    modalInputs.appendChild(crearBtn);

    // Función interna para renderizar inputs de cada grupo
    function renderModalGrupos(){
        // Limpiamos los inputs existentes excepto el botón de crear
        modalInputs.querySelectorAll(".grupo-modal").forEach(e=>e.remove());

        for(const nombreGrupo in grupos){
            const grupo = grupos[nombreGrupo];
            const div = document.createElement("div");
            div.className = "mb-3 grupo-modal border p-2 rounded";
            
            // Label con botón eliminar
            div.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label><strong>${nombreGrupo}</strong></label>
                    <button class="btn btn-danger btn-sm btn-eliminar-grupo">Eliminar grupo</button>
                </div>
                <textarea data-grupo="${nombreGrupo}" class="form-control">${grupo.alumnos.map(a=>`${a.numerolista||""}, ${a.nombre}`).join("\n")}</textarea>
            `;
            
            // Evento eliminar grupo
            div.querySelector(".btn-eliminar-grupo").onclick = () => {
                if(confirm(`¿Eliminar el grupo ${nombreGrupo}? Se perderán todos los alumnos.`)){
                    delete grupos[nombreGrupo];
                    renderBarraGrupos();
                    renderGrupos();
                    renderFiltros();
                    renderTablaFiltros();
                    renderModalGrupos();
                }
            };

            modalInputs.appendChild(div);
        }
    }

    renderModalGrupos();
    modal.style.display = "flex";
};

document.getElementById("cerrarModal").onclick = ()=>{ modal.style.display="none"; };

document.getElementById("guardarModal").onclick = () => {
    // Guardar cambios de alumnos
    modalInputs.querySelectorAll("textarea").forEach(area=>{
        const grupoNombre = area.dataset.grupo;
        const grupo = grupos[grupoNombre];
        const lineas = area.value.split("\n").map(l=>l.trim()).filter(l=>l);
        const nuevosAlumnos = [];
        lineas.forEach(l=>{
            const partes = l.split(",");
            const numero = partes[0]?.trim()||"";
            const nombre = partes.slice(1).join(",").trim();
            if(!nombre) return;
            const nuevo = {id:generarId(), numerolista:numero, nombre:nombre};
            grupo.columnasExtra.forEach(col=>nuevo[col]="");
            nuevosAlumnos.push(nuevo);
        });
        grupo.alumnos = nuevosAlumnos;
    });

    modal.style.display="none";
    renderGrupos();
    renderFiltros();
    renderTablaFiltros();
    guardarSupabase();
};
// -------- RENDER FILTROS --------
function renderFiltros(){
    const cont = document.getElementById("filtros");
    cont.innerHTML=""; if(hayBusquedaActiva()){ cont.style.display="none"; return; }
    cont.style.display="block";
    let columnas = new Set(["actividades","fecha","estado_expediente"]);
    for(let g in grupos) grupos[g].columnasExtra.forEach(c=>columnas.add(c));
    columnas.forEach(col=>{
        const btn = document.createElement("button");
        btn.className="btn btn-sm filtroBtn me-1 mb-1";
        btn.dataset.col=col;
        btn.innerText=col;
        if(filtrosActivos.includes(col)) btn.classList.add("btn-warning");
        else btn.classList.add("btn-outline-secondary");
        btn.onclick=function(){
            const c=this.dataset.col;
            if(filtrosActivos.includes(c)) filtrosActivos=filtrosActivos.filter(f=>f!==c);
            else filtrosActivos.push(c);
            const gruposCont = document.getElementById("gruposContainer");
            const tablaFiltrosCont = document.getElementById("tablaFiltros");
            if(filtrosActivos.length>0){ gruposCont.style.display="none"; tablaFiltrosCont.style.display="block"; }
            else{ gruposCont.style.display="block"; tablaFiltrosCont.style.display="none"; }
            renderTablaFiltros(); renderFiltros();
        };
        cont.appendChild(btn);
    });
}

// -------- BOTONES GENERALES DE FILTROS --------
document.getElementById("toggleANDBtn").onclick = () => { modoAND=!modoAND; document.getElementById("toggleANDBtn").innerText = modoAND?"Todos los filtros":"Cualquiera de los filtros"; renderTablaFiltros(); };
document.getElementById("addColGeneral").onclick = ()=>{
    const nombre = prompt("Nombre de la columna general:"); if(!nombre) return alert("Nombre inválido");
    for(let g in grupos){ const grupo = grupos[g]; if(!grupo.columnasExtra.includes(nombre)){ grupo.columnasExtra.push(nombre); grupo.alumnos.forEach(a=>a[nombre]=""); } }
    renderGrupos(); renderFiltros(); renderTablaFiltros(); guardarSupabase();
};
document.getElementById("delColGeneral").onclick = ()=>{
    let todasCols = new Set(); for(let g in grupos) grupos[g].columnasExtra.forEach(c=>todasCols.add(c));
    if(todasCols.size===0) return alert("No hay columnas para eliminar");
    let menu = Array.from(todasCols).map((c,i)=>`${i+1} - ${c}`).join("\n");
    let sel = prompt("Columnas:\n"+menu+"\n\nNúmero a eliminar:"); if(!sel) return;
    let index = parseInt(sel)-1; let colAEliminar = Array.from(todasCols)[index]; if(!colAEliminar) return alert("Número inválido");
    for(let g in grupos){ let grupo = grupos[g]; grupo.columnasExtra = grupo.columnasExtra.filter(c=>c!==colAEliminar); grupo.alumnos.forEach(a=>delete a[colAEliminar]); }
    renderGrupos(); renderFiltros(); renderTablaFiltros(); guardarSupabase();
};

function renderResultadosBusqueda(buscar){

// Cargar JSON
document.getElementById("cargarJson").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
        try {
            let jsonData = JSON.parse(evt.target.result);

            // Asegurar estructura correcta
            for (const g in jsonData) {
                const grupo = jsonData[g];

                // columnasExtra
                if (!grupo.columnasExtra) grupo.columnasExtra = [...columnasBase];

                // alumnos
                if (!grupo.alumnos) grupo.alumnos = [];

                grupo.alumnos.forEach(a => {
                    // Dar id si no tiene
                    if (!a.id) a.id = generarId();

                    // Inicializar columnasExtra en cada alumno si faltan
                    grupo.columnasExtra.forEach(col => {
                        if (!(col in a)) a[col] = "";
                    });
                });
            }

            grupos = jsonData;

            renderGrupos();
            renderFiltros();
            renderTablaFiltros();
            guardarSupabase();
            alert("JSON cargado correctamente");

        } catch (err) {
            console.error("Error al cargar JSON:", err);
            alert("El archivo JSON tiene un formato incorrecto");
        }
    };
    reader.readAsText(file);
});

function ordenarTabla(table, colIndex){
    const tbody = table.querySelector("tbody");
    const filas = Array.from(tbody.querySelectorAll("tr")).filter(r=>!r.classList.contains("detalle"));

    // Crear objeto para recordar el orden de cada columna
    if(!table._ordenCols) table._ordenCols = {};
    const asc = !(table._ordenCols[colIndex] ?? false); // true=asc, false=desc
    table._ordenCols[colIndex] = asc; // guardar estado actual

    filas.sort((a,b)=>{
        let valA = a.children[colIndex].innerText.trim();
        let valB = b.children[colIndex].innerText.trim();

        // Detectar tipo automáticamente
        let tipo = "texto";
        if(!isNaN(Date.parse(valA)) && !isNaN(Date.parse(valB))) tipo="fecha";
        else if(!isNaN(parseFloat(valA)) && !isNaN(parseFloat(valB))) tipo="numero";

        if(tipo==="numero"){ 
            valA = parseFloat(valA) || 0; 
            valB = parseFloat(valB) || 0; 
        }
        if(tipo==="fecha"){ 
            valA = new Date(valA); 
            valB = new Date(valB); 
        }
        if(tipo==="texto"){ 
            valA = valA.toLowerCase();
            valB = valB.toLowerCase();
            if(valA < valB) return asc ? -1 : 1;
            if(valA > valB) return asc ? 1 : -1;
        }

        return 0;
    });

    // Volver a añadir filas al tbody y mantener los detalles
    filas.forEach(f=>{
        tbody.appendChild(f);
        const det = f.nextElementSibling;
        if(det && det.classList.contains("detalle")) tbody.appendChild(det);
    });
}

// --------- Detectar cambios en todos los campos contenteditable ---------
document.body.addEventListener("input", function(e){
    const target = e.target;
    const id = target.dataset.id;
    const col = target.dataset.col;
    const grupoNombre = target.dataset.grupo; // algunos casos (detalle)

    if(!id || !col) return;

    // Buscar el alumno correspondiente
    for(const g in grupos){
        if(grupoNombre && g !== grupoNombre) continue; // si está en detalle, usar grupo exacto
        const alumno = grupos[g].alumnos.find(a=>a.id===id);
        if(alumno){
            alumno[col] = target.innerText || target.value || "";
            guardarSupabase();
            break;
        }
    }
});
